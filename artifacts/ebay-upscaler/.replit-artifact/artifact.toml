kind = "web"
previewPath = "/"
title = "eBay Image Pro"
version = "1.0.0"
id = "artifacts/ebay-upscaler"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18575

[services.development]
run = "pnpm --filter @workspace/ebay-upscaler run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ebay-upscaler", "run", "build" ]
publicDir = "artifacts/ebay-upscaler/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18575"
BASE_PATH = "/"
